<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحاضرة الأولى: أورام العظام والغضاريف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .feature-tag { @apply px-2 py-1 bg-blue-100 text-blue-700 text-[10px] font-bold rounded-md; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Navigation -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-200">
                    <i class="fa-solid fa-bone"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-none">PathologyPro</h1>
                    <span class="text-[10px] text-blue-500 font-black uppercase">Bone & Cartilage Tumors</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="renderView('study')" class="px-4 py-2 rounded-xl hover:bg-slate-100 font-bold text-sm transition">دراسة</button>
                <button onclick="startQuiz()" class="px-4 py-2 bg-blue-600 text-white rounded-xl font-bold text-sm shadow-md hover:bg-blue-700 transition">اختبر نفسك</button>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-6xl mx-auto px-4 py-8">
        <!-- Content injected here -->
    </main>

    <script>
        // Data derived from bone_cartilage_tumors_dataset.json and linked to uploaded images
        const tumors = [
            {
                id: "osteoma",
                name: "Osteoma",
                category: "Bone-forming tumor",
                type: "Benign",
                sites: ["Skull", "Face", "Paranasal sinuses", "Orbit"],
                features: ["Slow-growing", "Well-differentiated", "Regarded by some as a hamartoma"],
                radiology: "Solid, dense bone mass.",
                notes: "Rare, affects flat bones.",
                image: "07_osteoma.png"
            },
            {
                id: "osteoid_osteoma",
                name: "Osteoid Osteoma",
                category: "Bone-forming tumor",
                type: "Benign",
                age: "Young men",
                size: "< 2 cm",
                pain: "Relieved by aspirin and NSAIDs",
                radiology: "Nidus with thick rim of reactive cortical bone.",
                treatment: "Radiofrequency ablation",
                image: "09_osteoid_osteoma_examples.png"
            },
            {
                id: "osteoblastoma",
                name: "Osteoblastoma",
                category: "Bone-forming tumor",
                type: "Benign",
                sites: ["Vertebrae (Laminae, Pedicles)"],
                size: "> 2 cm",
                pain: "Unresponsive to aspirin",
                radiology: "Large lesion, well-defined margins.",
                treatment: "Curettage or excision",
                image: "10_osteoblastoma.png"
            },
            {
                id: "osteochondroma",
                name: "Osteochondroma",
                category: "Cartilage-forming tumor",
                type: "Benign",
                age: "Late adolescence",
                sites: ["Metaphysis of long bones (Knee)"],
                features: ["Cartilage cap (Hyaline)", "Solitary (85%)", "Continuous with marrow cavity"],
                image: "14_osteochondroma_example.png"
            },
            {
                id: "chondroma",
                name: "Chondroma",
                category: "Cartilage-forming tumor",
                type: "Benign",
                age: "20-50 years",
                sites: ["Tubular bones of hands and feet"],
                radiology: "Circumscribed lucency with irregular calcifications.",
                features: ["Gray-blue and translucent appearance"],
                image: "15_chondroma.png"
            },
            {
                id: "chondroblastoma",
                name: "Chondroblastoma",
                category: "Cartilage-forming tumor",
                type: "Benign",
                age: "Under 20 years",
                sites: ["Epiphysis (Knee, Humerus)"],
                radiology: "Sharply-circumscribed lytic lesion with foci of calcification.",
                features: ["Chicken-wire calcification (Histology)"],
                image: "18_chondroblastoma_examples.png"
            },
            {
                id: "malignant_comparison",
                name: "Malignant Comparison",
                category: "Sarcomas",
                type: "Malignant",
                age: "Osteosarcoma (Young) / Chondrosarcoma (Older)",
                sites: ["Osteo (Knee) / Chondro (Pelvis)"],
                radiology: "Aggressive, destructive lesions.",
                image: "04_osteosarcoma_chondrosarcoma_comparison.png"
            }
        ];

        let selectedTumorIndex = 0;

        function renderView(view) {
            const container = document.getElementById('main-content');
            if (view === 'study') {
                renderStudyView(container);
            }
        }

        function renderStudyView(container) {
            const tumor = tumors[selectedTumorIndex];
            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <!-- List Sidebar -->
                    <div class="lg:col-span-4 space-y-3 max-h-[70vh] overflow-y-auto no-scrollbar">
                        ${tumors.map((t, i) => `
                            <div onclick="selectTumor(${i})" class="p-4 rounded-2xl border-2 transition-all cursor-pointer flex items-center gap-4 ${selectedTumorIndex === i ? 'bg-blue-600 border-blue-600 text-white shadow-lg' : 'bg-white border-slate-100 hover:border-blue-200'}">
                                <div class="w-12 h-12 bg-slate-100 rounded-xl overflow-hidden shrink-0">
                                    <img src="${t.image}" class="w-full h-full object-cover">
                                </div>
                                <div>
                                    <h4 class="font-bold text-sm">${t.name}</h4>
                                    <span class="text-[10px] opacity-70">${t.type}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Details Area -->
                    <div class="lg:col-span-8">
                        <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
                            <div class="aspect-video bg-slate-900 flex items-center justify-center p-4">
                                <img src="${tumor.image}" class="max-w-full max-h-full object-contain shadow-2xl rounded-lg">
                            </div>
                            <div class="p-8">
                                <div class="flex justify-between items-start mb-6">
                                    <div>
                                        <span class="text-blue-600 font-black text-[10px] uppercase tracking-widest">${tumor.category}</span>
                                        <h2 class="text-3xl font-black text-slate-900">${tumor.name}</h2>
                                    </div>
                                    <span class="px-3 py-1 rounded-full ${tumor.type === 'Benign' ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'} text-xs font-bold">
                                        ${tumor.type}
                                    </span>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
                                    <div class="space-y-4">
                                        ${tumor.age ? `<div><span class="font-black text-slate-400 block uppercase text-[10px]">العمر الشائع</span><p>${tumor.age}</p></div>` : ''}
                                        ${tumor.sites ? `<div><span class="font-black text-slate-400 block uppercase text-[10px]">المواقع الشائعة</span><p>${tumor.sites.join(', ')}</p></div>` : ''}
                                        ${tumor.radiology ? `<div><span class="font-black text-slate-400 block uppercase text-[10px]">المظاهر الشعاعية</span><p>${tumor.radiology}</p></div>` : ''}
                                    </div>
                                    <div class="space-y-4">
                                        ${tumor.pain ? `<div><span class="font-black text-slate-400 block uppercase text-[10px]">نمط الألم</span><p class="text-blue-600 font-bold">${tumor.pain}</p></div>` : ''}
                                        ${tumor.features ? `
                                            <div>
                                                <span class="font-black text-slate-400 block uppercase text-[10px] mb-2">مميزات إضافية</span>
                                                <div class="flex flex-wrap gap-2">
                                                    ${tumor.features.map(f => `<span class="bg-slate-100 px-2 py-1 rounded text-[10px] font-bold">${f}</span>`).join('')}
                                                </div>
                                            </div>
                                        ` : ''}
                                        ${tumor.treatment ? `<div class="bg-blue-50 p-3 rounded-xl"><span class="font-black text-blue-400 block uppercase text-[10px]">العلاج</span><p class="text-blue-700 font-bold">${tumor.treatment}</p></div>` : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function selectTumor(i) {
            selectedTumorIndex = i;
            renderView('study');
        }

        // --- QUIZ LOGIC ---
        let quizData = [];
        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        function startQuiz() {
            quizData = [...tumors].sort(() => 0.5 - Math.random());
            currentQuestion = 0;
            score = 0;
            answered = false;
            renderQuizPage();
        }

        function renderQuizPage() {
            const container = document.getElementById('main-content');
            const q = quizData[currentQuestion];
            const options = [q, ...tumors.filter(t => t.id !== q.id).sort(() => 0.5 - Math.random()).slice(0, 3)].sort(() => 0.5 - Math.random());

            container.innerHTML = `
                <div class="max-w-2xl mx-auto bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden">
                    <div class="h-1 bg-blue-600" style="width: ${((currentQuestion + 1) / quizData.length) * 100}%"></div>
                    <div class="p-8 md:p-12">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">سؤال ${currentQuestion + 1} من ${quizData.length}</span>
                            <span class="text-xs font-bold text-blue-600">النتيجة: ${score}</span>
                        </div>
                        <div class="aspect-video bg-slate-100 rounded-2xl overflow-hidden mb-8 shadow-inner border">
                            <img src="${q.image}" class="w-full h-full object-contain">
                        </div>
                        <h3 class="text-xl font-bold mb-6 text-center">ما هو التشخيص الصحيح لهذه الصورة؟</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            ${options.map(opt => `
                                <button onclick="handleAnswer('${opt.id}', '${q.id}')" id="btn-${opt.id}" class="p-4 rounded-xl border-2 font-bold text-sm transition-all hover:bg-blue-50 hover:border-blue-200">
                                    ${opt.name}
                                </button>
                            `).join('')}
                        </div>
                        <div id="quiz-feedback" class="mt-8 text-center h-10"></div>
                        <button id="next-btn" onclick="nextQuestion()" class="hidden w-full mt-4 bg-slate-900 text-white py-4 rounded-xl font-bold shadow-lg">السؤال التالي</button>
                    </div>
                </div>
            `;
        }

        function handleAnswer(selectedId, correctId) {
            if (answered) return;
            answered = true;
            const feedback = document.getElementById('quiz-feedback');
            const nextBtn = document.getElementById('next-btn');
            
            if (selectedId === correctId) {
                score++;
                document.getElementById(`btn-${selectedId}`).classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-700');
                feedback.innerHTML = `<span class="text-emerald-600 font-bold">إجابة صحيحة! أحسنت.</span>`;
            } else {
                document.getElementById(`btn-${selectedId}`).classList.add('bg-rose-50', 'border-rose-500', 'text-rose-700');
                document.getElementById(`btn-${correctId}`).classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-700');
                feedback.innerHTML = `<span class="text-rose-600 font-bold">إجابة خاطئة. الإجابة الصحيحة هي ${tumors.find(t => t.id === correctId).name}</span>`;
            }
            nextBtn.classList.remove('hidden');
        }

        function nextQuestion() {
            if (currentQuestion + 1 < quizData.length) {
                currentQuestion++;
                answered = false;
                renderQuizPage();
            } else {
                renderResults();
            }
        }

        function renderResults() {
            const container = document.getElementById('main-content');
            const percent = Math.round((score / quizData.length) * 100);
            container.innerHTML = `
                <div class="max-w-xl mx-auto text-center py-12 bg-white rounded-[3rem] shadow-2xl border border-slate-100">
                    <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-6">
                        <i class="fa-solid fa-trophy"></i>
                    </div>
                    <h2 class="text-4xl font-black mb-2">انتهى الاختبار!</h2>
                    <p class="text-slate-500 mb-8">لقد أجبت على ${score} من أصل ${quizData.length} أسئلة بشكل صحيح.</p>
                    <div class="text-5xl font-black text-blue-600 mb-8">${percent}%</div>
                    <div class="flex gap-4 px-8">
                        <button onclick="startQuiz()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">إعادة الاختبار</button>
                        <button onclick="renderView('study')" class="flex-1 border-2 border-slate-200 py-4 rounded-2xl font-bold hover:bg-slate-50 transition">العودة للدراسة</button>
                    </div>
                </div>
            `;
        }

        // Initialize
        window.onload = () => renderView('study');
    </script>
</body>
</html>
